<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0c0d11" />
<title>Jupiter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']],processEscapes:true},
  options:{skipHtmlTags:['script','noscript','style','textarea']},startup:{typeset:false}};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script type="module">
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
  window.pdfjsLib=pdfjsLib;
</script>
<style>
  :root{
    --bg:#0c0d11; --surface:#15171e; --surface2:#1b1e27; --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.14); --txt:#eef1f6; --dim:#8a93a6; --dim2:#576074;
    --accent:#ff2f6d;
    --ok:#3fb98a;
    --sans:"JetBrains Mono",ui-monospace,monospace; --mono:"JetBrains Mono",monospace;
    --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);overflow-x:hidden;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(130% 70% at 50% -10%,rgba(255,47,109,.07),transparent 55%)}
  a{color:inherit;text-decoration:none}

  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:calc(12px + var(--safe-t)) 16px 12px;background:rgba(12,13,17,.82);
    backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .top .back{width:34px;height:34px;flex:0 0 auto;display:none;align-items:center;justify-content:center;
    border:1px solid var(--line2);border-radius:9px;color:var(--dim);background:transparent}
  .top .back.on{display:flex}
  .top .back svg{width:17px;height:17px}
  .top .mk{width:6px;height:17px;border-radius:2px;background:var(--accent);flex:0 0 auto}
  .top .ttl{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .spacer{flex:1}
  .top .sectag{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--accent);border:1px solid var(--line2);padding:5px 9px;border-radius:7px}

  .view{display:none;padding:20px 16px calc(40px + var(--safe-b))}
  .view.on{display:block;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--accent);margin-bottom:9px}
  .vtitle{font-size:25px;font-weight:700;letter-spacing:.2px;margin-bottom:6px;line-height:1.2}
  .vsub{font-size:13px;color:var(--dim);line-height:1.55;margin-bottom:24px}

  .gate{min-height:74vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 6px}
  .gate .gmark{width:60px;height:60px;display:flex;align-items:center;justify-content:center;
    background:#000;border:1.5px solid var(--accent);border-radius:16px;color:var(--accent);
    font-family:var(--mono);font-weight:700;font-size:32px;line-height:1;margin-bottom:20px;
    box-shadow:0 0 0 5px color-mix(in srgb,var(--accent) 12%,transparent),
      0 0 14px color-mix(in srgb,var(--accent) 22%,transparent)}
  .gate .gwordmark{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:5px;
    color:var(--txt);margin-bottom:32px}
  .secbtns{display:flex;flex-direction:column;gap:11px;width:100%;max-width:360px}
  .secbtn{display:flex;align-items:center;gap:14px;padding:18px 16px;border:1px solid var(--line);
    background:var(--surface);border-radius:14px;text-align:left;cursor:pointer;transition:.16s;
    position:relative;overflow:hidden}
  .secbtn:active{transform:scale(.985);background:var(--surface2);
    box-shadow:0 0 24px color-mix(in srgb,var(--accent) 35%,transparent)}
  .secbtn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--accent))}
  .secbtn .si{width:42px;height:42px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;
    justify-content:center;background:color-mix(in srgb,var(--c,var(--accent)) 18%,transparent);color:var(--c,var(--accent))}
  .secbtn .si svg{width:20px;height:20px}
  .secbtn .sb{flex:1;min-width:0}
  .secbtn .sn{font-size:16px;font-weight:600;letter-spacing:.3px;color:var(--txt)}
  .secbtn .sa{color:var(--dim2)}

  .list{display:flex;flex-direction:column;gap:11px}
  .item{display:flex;align-items:center;gap:14px;padding:17px 16px;border:1px solid var(--line);
    background:var(--surface);border-radius:14px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .item:active{transform:scale(.99);background:var(--surface2);
    box-shadow:0 0 22px color-mix(in srgb,var(--accent) 32%,transparent)}
  .item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--accent))}
  .item .ic{width:40px;height:40px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;
    justify-content:center;background:color-mix(in srgb,var(--c,var(--accent)) 16%,transparent);
    color:var(--c,var(--accent))}
  .item .ic svg{width:19px;height:19px}
  .item .bd{flex:1;min-width:0}
  .item .nm{font-size:15px;font-weight:600;letter-spacing:.2px;line-height:1.25}
  .item .mt{font-size:11px;color:var(--dim);margin-top:3px;font-family:var(--mono);letter-spacing:.2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .ar{color:var(--dim2);flex:0 0 auto}
  .item .ar svg{width:18px;height:18px}

  .grouptitle{font-family:var(--mono);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;
    color:var(--dim2);margin:24px 2px 11px}
  .grouptitle:first-of-type{margin-top:6px}
  .file{display:flex;align-items:center;gap:14px;padding:15px;border:1px solid var(--line);
    background:var(--surface);border-radius:13px;cursor:pointer;margin-bottom:9px;transition:.15s}
  .file:active{transform:scale(.99);background:var(--surface2);
    box-shadow:0 0 18px color-mix(in srgb,var(--accent) 25%,transparent)}
  .file .ft{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;
    border:1px solid var(--line2);color:var(--dim);padding:4px 7px;border-radius:6px;flex:0 0 auto;
    width:54px;text-align:center}
  .file.corr .ft{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 45%,transparent);
    box-shadow:0 0 8px color-mix(in srgb,var(--ok) 40%,transparent)}
  .file .fn{flex:1;min-width:0;font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file .fa{color:var(--dim2);flex:0 0 auto}
  .file .fa svg{width:16px;height:16px}
  .emptybox{font-family:var(--mono);font-size:11.5px;color:var(--dim);border:1px dashed var(--line);
    border-radius:12px;padding:22px;text-align:center;line-height:1.6}

  .pdfview{position:fixed;inset:0;z-index:60;background:#000;display:none;flex-direction:column}
  .pdfview.on{display:flex}
  .pdfbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) 14px 10px;
    background:#0a0b0e;border-bottom:1px solid var(--line)}
  .pdfbar .pn{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pdfbar button{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line2);border-radius:9px;background:transparent;color:var(--dim)}
  .pdfbar button svg{width:17px;height:17px}
  .pdfview iframe{flex:1;width:100%;border:0;background:#fff}
  /* rendu PDF.js (canvas) avec scrollbar custom */
  .pdf-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:auto;background:#1a1c22;padding:10px 0;
    scrollbar-width:thin;scrollbar-color:#1a1c24 transparent}
  .pdf-scroll::-webkit-scrollbar{width:5px;height:5px}
  .pdf-scroll::-webkit-scrollbar-track{background:transparent}
  .pdf-scroll::-webkit-scrollbar-thumb{background:#1a1c24}
  .pdf-scroll canvas{display:block;margin:0 auto 10px;max-width:100%;height:auto;box-shadow:0 2px 12px rgba(0,0,0,.5)}
  .pdf-scroll canvas:last-child{margin-bottom:0}
  .pdffallback{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;padding:30px;text-align:center;color:var(--dim);font-size:13px;line-height:1.6}
  .pdffallback a{border:1px solid var(--accent);background:color-mix(in srgb,var(--accent) 16%,transparent);
    color:var(--txt);padding:13px 22px;border-radius:11px;font-weight:600;font-size:13px}

  /* ----- bouton "Se tester" en bas de la fiche chapitre ----- */
  .testcta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:22px;
    padding:16px;border:1px solid var(--accent);border-radius:13px;
    background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--txt);
    font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
  .testcta:active{transform:scale(.99);box-shadow:0 0 26px color-mix(in srgb,var(--accent) 35%,transparent)}
  .testcta:disabled{opacity:.35}
  .testcta svg{width:16px;height:16px;flex:0 0 auto}

  /* ----- mode test (flash) ----- */
  .testtop{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .tprogress{font-family:var(--mono);font-size:12px;letter-spacing:.4px;color:var(--dim)}
  .tprogress b{color:var(--txt);font-weight:600}
  .tarevoir{font-family:var(--mono);font-size:10px;color:#ff6a6a;margin-left:4px}
  .pbar{height:3px;background:var(--line);border-radius:2px;margin-bottom:22px;position:relative;overflow:hidden}
  .pbar i{position:absolute;left:0;top:0;bottom:0;background:var(--accent);transition:width .35s;border-radius:2px;
    box-shadow:0 0 6px var(--accent)}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .qhead{padding:12px 16px;display:flex;align-items:center;gap:8px}
  .qkind{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);
    border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);padding:4px 9px;border-radius:6px}
  .qchap{font-family:var(--mono);font-size:9px;color:var(--dim2);letter-spacing:.3px}
  .qbody{padding:22px 18px 22px}
  .qprompt{font-size:20px;font-weight:700;line-height:1.4;color:var(--txt);font-family:system-ui,-apple-system,sans-serif}
  /* séparateur + réponse intégrée dans la carte */
  .answer{border-top:1px solid var(--line);margin:0 -18px;padding:0 18px;max-height:0;overflow:hidden;opacity:0;
    transition:max-height .4s ease,opacity .3s ease,padding .4s ease}
  .answer.on{max-height:2000px;opacity:1;padding:18px 18px 4px}
  .answer .atext{font-size:16px;line-height:1.7;color:var(--txt);white-space:pre-wrap;
    font-family:system-ui,-apple-system,sans-serif}
  .answer .atext .ph{color:var(--dim2);font-style:italic;font-size:14px}
  /* boutons principaux */
  .testctrl{display:flex;gap:10px;margin-top:20px}
  .testctrl button{flex:1;border:1px solid var(--line2);background:var(--surface);color:var(--dim);
    font-size:16px;font-weight:600;padding:17px 10px;border-radius:14px;
    font-family:system-ui,-apple-system,sans-serif}
  .testctrl button.primary{border:none;color:#fff;background:var(--accent)}
  .testctrl button.primary:active{box-shadow:0 0 26px color-mix(in srgb,var(--accent) 45%,transparent)}
  .testctrl button:disabled{opacity:.28}
  /* auto-eval */
  .selfeval{display:flex;gap:8px;margin-top:12px;opacity:0;max-height:0;overflow:hidden;transition:.3s}
  .selfeval.on{opacity:1;max-height:80px}
  .selfeval .se{flex:1;border:1px solid var(--line2);background:var(--surface);color:var(--txt);
    font-size:14px;font-weight:600;padding:14px 6px;border-radius:14px;
    font-family:system-ui,-apple-system,sans-serif}
  .selfeval .se.ko{border-color:color-mix(in srgb,#ff4040 55%,transparent);color:#ff6a6a}
  .selfeval .se.ko:active{box-shadow:0 0 18px rgba(255,64,64,.4)}
  .selfeval .se.mid{border-color:color-mix(in srgb,#ffaf28 55%,transparent);color:#ffc04d}
  .selfeval .se.mid:active{box-shadow:0 0 18px rgba(255,175,40,.4)}
  .selfeval .se.ok{border-color:color-mix(in srgb,var(--ok) 60%,transparent);color:#5fe6a3}
  .selfeval .se.ok:active{box-shadow:0 0 18px color-mix(in srgb,var(--ok) 55%,transparent)}
  /* footer discret */
  .testfoot{margin-top:28px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--dim2)}
  .testfoot a{color:var(--dim);text-decoration:underline;cursor:pointer}

  .center{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:16px;padding:0 24px}
  .ring{width:30px;height:30px;border:2px solid var(--line2);border-top-color:var(--accent);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .center p{font-size:13px;color:var(--dim);line-height:1.6}
  .center .mono{font-family:var(--mono);font-size:11px;color:var(--dim2);word-break:break-word}

  .toast{position:fixed;left:50%;bottom:calc(30px + var(--safe-b));transform:translateX(-50%);z-index:80;
    background:rgba(20,22,28,.96);border:1px solid var(--line2);color:var(--txt);font-size:12.5px;
    padding:12px 18px;border-radius:11px;backdrop-filter:blur(8px);max-width:88vw;text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 16px color-mix(in srgb,var(--accent) 15%,transparent)}
</style>
</head>
<body>

<div class="top">
  <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
  <span class="mk"></span>
  <span class="ttl" id="topTitle">Jupiter</span>
  <span class="spacer"></span>
  <span class="sectag" id="secTag" style="display:none">—</span>
</div>

<section class="view on" id="v-gate">
  <div class="gate">
    <div class="gmark">J</div>
    <div class="gwordmark">JUPITER</div>
    <div class="secbtns" id="secBtns"></div>
  </div>
</section>

<section class="view" id="v-loading">
  <div class="center"><div class="ring"></div><p>Chargement…</p></div>
</section>

<section class="view" id="v-error">
  <div class="center">
    <p id="errMsg">Impossible de charger cette section.</p>
    <p class="mono" id="errDetail"></p>
    <button class="qbtn" style="border:1px solid var(--line2);background:var(--surface);color:var(--txt);padding:12px 22px;border-radius:11px;font-family:var(--sans);font-weight:600;cursor:pointer" id="errBack">Retour</button>
  </div>
</section>

<section class="view" id="v-subjects">
  <div class="eyebrow" id="subEyebrow">Documents</div>
  <div class="vtitle" id="subTitle">Matières</div>
  <div class="list" id="subjectList"></div>
</section>

<section class="view" id="v-chapters">
  <div class="eyebrow" id="chEyebrow">Matière</div>
  <div class="vtitle">Chapitres</div>
  <div class="list" id="chapterList"></div>
</section>

<section class="view" id="v-chapter">
  <div class="eyebrow" id="cdEyebrow">Chapitre</div>
  <div class="vtitle" id="cdTitle">—</div>
  <div class="vsub" id="cdDesc"></div>
  <div id="resGroups"></div>
  <button class="testcta" id="goTest" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Se tester
  </button>
</section>

<section class="view" id="v-test">
  <div class="testtop">
    <div class="tprogress"><b id="qNum">1</b> / <span id="qTot">1</span></div>
    <span class="tarevoir" id="qArevoir"></span>
  </div>
  <div class="pbar"><i id="pbar"></i></div>
  <div class="qcard">
    <div class="qhead"><span class="qkind" id="qKind">Question</span><span class="qchap" id="qChap">—</span></div>
    <div class="qbody">
      <div class="qprompt" id="qPrompt">—</div>
      <div class="answer" id="answer"><div class="atext" id="aText"></div></div>
    </div>
  </div>
  <div class="testctrl">
    <button id="revealBtn" class="primary">Afficher la réponse</button>
    <button id="nextBtn" disabled>Question suivante</button>
  </div>
  <div class="selfeval" id="selfeval">
    <button class="se ko" data-v="0">À revoir</button>
    <button class="se mid" data-v="1">Moyen</button>
    <button class="se ok" data-v="2">Acquis</button>
  </div>
  <div class="testfoot">
    Évalue-toi honnêtement. <a id="resetBtn">Réinitialiser</a>
  </div>
</section>

<div class="pdfview" id="pdfview">
  <div class="pdfbar">
    <button id="pdfClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
    <span class="pn" id="pdfName">document.pdf</span>
    <button id="pdfTab" title="Ouvrir dans un onglet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
  </div>
  <div id="pdfBody" style="flex:1;display:flex;min-height:0"></div>
</div>
<script>
/* =====================================================================
   JUPITER MOBILE — navigation, ouverture de documents (PDF.js) et flash.
   Lit schema.json (sections) puis un manifest.json par section.
   Pas d'arbre 3D sur mobile.
   ===================================================================== */
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const norm=s=>String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');

/* --- BASE : URL du site (même origine si servi depuis GitHub Pages) --- */
const BASE=(()=>{
  const stored=localStorage.getItem('jupiter-gh-base');
  if(stored) return stored.endsWith('/')?stored:stored+'/';
  try{
    const cfg=JSON.parse(localStorage.getItem('jupiter-gh-config')||'{}');
    if(cfg.owner&&cfg.repo) return `https://${cfg.owner}.github.io/${cfg.repo}/`;
  }catch(e){}
  return location.origin+location.pathname.replace(/\/[^/]*$/,'/');
})();

/* --- schema chargé dynamiquement (plus aucune section hardcodée) --- */
let SCHEMA=null;

/* defs de ressources dérivées du schema (catégories de la matière courante) */
function getResDefs(subject){
  const cats=(subject&&subject.categories)||[];
  if(cats.length) return cats.map(c=>({key:c.id,label:c.label||c.id}));
  /* fallback si le schema n'expose pas les catégories : déduire des clés présentes */
  const keys=new Set();
  (subject?.chapters||[]).forEach(ch=>Object.keys(ch.res||{}).forEach(k=>keys.add(k)));
  return [...keys].map(k=>({key:k,label:k}));
}
/* defs Culture : catégories de la section, sinon déduites des clés du manifest */
function getCultureDefs(){
  const cats=(SEC&&SEC.categories)||[];
  if(cats.length) return cats.map(c=>({key:c.label||c.id,label:c.label||c.id}));
  const keys=new Set();
  subjectsArr().forEach(n=>Object.keys(n.res||{}).forEach(k=>keys.add(k)));
  return [...keys].map(k=>({key:k,label:k}));
}

/* abréviations de catégorie pour nettoyer les noms de fichiers */
function catAbbrevsFor(subject, chapter){
  const cats=((subject&&subject.categories)||[]).map(c=>c.abbrev||c.id);
  if(cats.length) return cats;
  /* fallback: clés présentes dans le res du chapitre courant */
  if(chapter&&chapter.res) return Object.keys(chapter.res);
  return [];
}

/* nom affiché : retire le préfixe d'identification (chapitre + catégorie) */
function displayName(fname, chapNom, catAbbrevs){
  const dot=fname.lastIndexOf('.');
  const base=dot>=0?fname.slice(0,dot):fname;
  const stripNum=s=>s.replace(/^\s*\d+\s*[-–._]\s*/,'');
  const parts=base.split('_');
  const chapN=chapNom?norm(chapNom):'';
  const abbrevSet=new Set((catAbbrevs||[]).map(a=>norm(a)));
  const kept=parts.filter(p=>{
    const ps=stripNum(p), pn=norm(ps);
    if(!pn) return false;
    if(/^\d+$/.test(p.trim())) return false;
    if(chapN && (pn===chapN||pn.startsWith(chapN)||chapN.startsWith(pn))) return false;
    if(abbrevSet.has(norm(ps.replace(/\d+$/,'')))) return false;
    return true;
  });
  if(kept.length) return kept.join(' ').trim();
  return stripNum(parts[parts.length-1]).trim()||stripNum(base).trim()||base;
}

const ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
const BOOK='<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>';
const CHAP='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>';

/* --- progression quiz (IndexedDB) --- */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('jupiter-v1',2);
  r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('progress'))db.createObjectStore('progress');};
  r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function idbSet(k,v){const db=await idb();return new Promise((res,rej)=>{
  const tx=db.transaction('progress','readwrite');tx.objectStore('progress').put(v,k);
  tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);});}
async function idbGet(k){const db=await idb();return new Promise((res,rej)=>{
  const tx=db.transaction('progress','readonly');const rq=tx.objectStore('progress').get(k);
  rq.onsuccess=()=>res(rq.result);rq.onerror=e=>rej(e.target.error);});}
async function idbDel(k){const db=await idb();return new Promise((res,rej)=>{
  const tx=db.transaction('progress','readwrite');tx.objectStore('progress').delete(k);
  tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);});}

const views={gate:$('#v-gate'),loading:$('#v-loading'),error:$('#v-error'),
  subjects:$('#v-subjects'),chapters:$('#v-chapters'),chapter:$('#v-chapter'),test:$('#v-test')};
/* Dégradé pensé pour un affichage en une seule colonne : les cartes se suivent
   verticalement, donc la teinte glisse en continu de l'une à l'autre au lieu
   de sauter (l'ancien tableau de teintes éparses était pensé pour une grille). */
function gradientColor(i,total){
  const START=345;   // ancré sur l'accent rose (#ff2f6d)
  const SPAN=210;    // balayage total sur la liste : rose -> orangé -> vert -> bleu
  const t=total<=1?0:i/(total-1);
  const hue=(START+t*SPAN)%360;
  const light=62-t*6; // légère respiration de luminosité en descendant la colonne
  return `hsl(${hue.toFixed(1)}deg 78% ${light.toFixed(1)}%)`;
}
let SEC=null, MAN=null, cur={subject:null,chapter:null};

function show(name){
  Object.values(views).forEach(v=>v.classList.remove('on'));
  views[name].classList.add('on');
  $('#backBtn').classList.toggle('on', name!=='gate');
  window.scrollTo(0,0);
}
function goBack(){
  if($('#pdfview').classList.contains('on')){ closePdf(); return; }
  if(views.test.classList.contains('on')){ renderChapterDetail(); show('chapter'); return; }
  if(views.chapter.classList.contains('on')){ show(MAN.kind==='culture'?'subjects':'chapters'); return; }
  if(views.chapters.classList.contains('on')){ show('subjects'); return; }
  show('gate');
}
$('#backBtn').onclick=goBack;
$('#errBack').onclick=()=>show('gate');

function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
/* accent maintenu rouge (#ff2f6d) — aucune couleur de section, jamais de bleu */
function setAccent(){ document.documentElement.style.setProperty('--accent','#ff2f6d'); }

/* --- écran de choix de section : lit schema.json (aucune section hardcodée) --- */
/* icônes par défaut pour les sections selon leur index */
const SEC_ICONS=[
  '<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>',
  '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>',
  '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
];
const SECTION_ICON=SEC_ICONS[0]; // fallback
async function renderGate(){
  setAccent();
  const wrap=$('#secBtns');
  wrap.innerHTML='<div class="center" style="min-height:auto;padding:20px"><div class="ring"></div></div>';
  try{
    const url=BASE+'schema.json';
    const r=await fetch(url,{cache:'no-cache'});
    if(!r.ok) throw new Error('HTTP '+r.status+' — '+url);
    SCHEMA=await r.json();
  }catch(e){
    SCHEMA=null;
    wrap.innerHTML=`<div class="emptybox" style="text-align:left">
      <b style="color:var(--txt);display:block;margin-bottom:10px">schema.json introuvable</b>
      <span style="font-family:var(--mono);font-size:10px;color:var(--dim2);word-break:break-all">${esc(BASE+'schema.json')}</span><br><br>
      ${esc(String(e.message||e))}<br><br>
      Publie le dépôt via l'éditeur PC (bouton « Tout publier »), puis recharge.
    </div>`;
    return;
  }
  const sections=(SCHEMA&&SCHEMA.sections)||[];
  wrap.innerHTML='';
  if(!sections.length){
    wrap.innerHTML='<div class="emptybox">schema.json chargé — aucune section définie.<br>Crée une section dans l\'éditeur.</div>';
    return;
  }
  sections.forEach((sec,i)=>{
    const nom=sec.label||sec.id;
    const col=sec.color||gradientColor(i,sections.length);
    const icon=sec.icon||(SEC_ICONS[i%SEC_ICONS.length]);
    const b=document.createElement('button'); b.className='secbtn';
    b.style.setProperty('--c',col);
    b.innerHTML=`<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${icon}</svg></span>
      <span class="sb"><span class="sn">${esc(nom)}</span></span>
      <span class="sa">${ARROW}</span>`;
    b.onclick=()=>loadSection({
      id:sec.id, nom,
      manifest:sec.manifest||(sec.id+'/manifest.json'),
      categories:sec.categories||[],
      subjectsSchema:sec.subjects||[]
    });
    wrap.appendChild(b);
  });
}

/* --- chargement d'une section depuis son manifest --- */
async function loadSection(sec){
  SEC=sec; setAccent();
  $('#secTag').style.display='inline-block'; $('#secTag').textContent=sec.nom;
  show('loading');
  try{
    const res=await fetch(BASE+sec.manifest,{cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status+' — '+sec.manifest);
    MAN=await res.json();
    /* rattacher les catégories du schema à chaque matière (pour res defs + nettoyage noms) */
    const schemaSubjects=sec.subjectsSchema||[];
    (MAN.data?.subjects||[]).forEach(subj=>{
      const ss=schemaSubjects.find(s=>s.id===subj.id||s.label===subj.nom);
      subj.categories=ss?.categories||[];
    });
    renderSubjects();
    show('subjects');
  }catch(e){
    $('#errMsg').textContent='Impossible de charger « '+sec.nom+' ».';
    $('#errDetail').textContent=String(e.message||e)+
      '. Vérifie que '+BASE+sec.manifest+' existe en ligne (généré avec l\'éditeur).';
    show('error');
  }
}

function subjectsArr(){ return MAN.kind==='culture' ? (MAN.data.notions||[]) : (MAN.data.subjects||[]); }

function renderSubjects(){
  const culture=MAN.kind==='culture';
  $('#subEyebrow').textContent=SEC.nom;
  $('#subTitle').textContent=culture?'Notions':'Matières';
  const arr=subjectsArr();
  const list=$('#subjectList'); list.innerHTML='';
  if(!arr.length){ list.innerHTML='<div class="emptybox">Aucune matière dans cette section pour le moment.</div>'; return; }
  arr.forEach((s,i)=>{
    const col=gradientColor(i,arr.length);
    const sub=culture ? `${countFiles(s)} fiche(s)` : `${(s.chapters||[]).length} chapitre(s)`;
    list.appendChild(itemEl(col,BOOK,s.nom,sub,()=>{ cur.subject=s; openSubject(s); }));
  });
}
function countFiles(node){
  let n=0; const defs=MAN.kind==='culture'?getCultureDefs():getResDefs(node);
  defs.forEach(d=>{ n+=((node.res&&node.res[d.key])||[]).length; });
  return n;
}
function itemEl(color,iconPath,name,meta,onclick){
  const el=document.createElement('div'); el.className='item'; el.style.setProperty('--c',color);
  el.innerHTML=`<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg></span>
    <span class="bd"><span class="nm">${esc(name)}</span><span class="mt">${esc(meta)}</span></span>
    <span class="ar">${ARROW}</span>`;
  el.onclick=onclick; return el;
}

function openSubject(s){
  if(MAN.kind==='culture'){ cur.chapter=s; renderChapterDetail(); show('chapter'); return; }
  renderChapters(s); show('chapters');
}

function renderChapters(s){
  $('#chEyebrow').textContent=s.nom;
  const list=$('#chapterList'); list.innerHTML='';
  const chs=s.chapters||[];
  if(!chs.length){ list.innerHTML='<div class="emptybox">Aucun chapitre pour le moment.</div>'; return; }
  const defs=getResDefs(s);
  chs.forEach((c,i)=>{
    const col=gradientColor(i,chs.length);
    const nf=defs.reduce((a,d)=>a+((c.res&&c.res[d.key])||[]).length,0);
    const nq=(c.questions||[]).length;
    const meta=(nf?`${nf} document${nf>1?'s':''}`:'Vide')+(nq?` · ${nq}q`:'');
    list.appendChild(itemEl(col,CHAP,c.nom,meta,()=>{ cur.chapter=c; renderChapterDetail(); show('chapter'); }));
  });
}

function renderChapterDetail(){
  const c=cur.chapter, culture=MAN.kind==='culture';
  $('#cdEyebrow').textContent = culture ? SEC.nom : cur.subject.nom;
  $('#cdTitle').textContent=c.nom;
  $('#cdDesc').textContent=c.description||'';
  $('#cdDesc').style.display=c.description?'block':'none';
  const defs=culture?getCultureDefs():getResDefs(cur.subject);
  const abbrevs=catAbbrevsFor(cur.subject, c);
  const box=$('#resGroups'); box.innerHTML='';
  let any=false;
  defs.forEach(d=>{
    const files=(c.res&&c.res[d.key])||[];
    if(!files.length) return;
    any=true;
    const t=document.createElement('div'); t.className='grouptitle'; t.textContent=d.label||d.key;
    box.appendChild(t);
    files.forEach(f=>{
      const ext=(f.name.split('.').pop()||'').toUpperCase();
      const label=displayName(f.name,c.nom,abbrevs);
      const el=document.createElement('div'); el.className='file'+(f.corrige?' corr':'');
      el.innerHTML=`<span class="ft">${esc(f.corrige?'Corr.':ext)}</span><span class="fn">${esc(label)}</span>
        <span class="fa">${ARROW}</span>`;
      el.onclick=()=>openFile(f,label);
      box.appendChild(el);
    });
  });
  if(!any) box.innerHTML='<div class="emptybox">Aucun document dans ce chapitre.</div>';
  /* bouton "Se tester" : visible si le chapitre a des questions */
  const nq=(c.questions||[]).length;
  const gt=$('#goTest');
  gt.style.display='flex';
  gt.disabled=nq===0;
  const ic='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
  gt.innerHTML=ic+(nq?`Se tester · ${nq}`:'Aucune question');
}

/* --- ouverture de fichier (PDF via PDF.js / image) --- */
let pdfState={doc:null,task:null,cancelled:false};
function fileUrl(f){
  const rel=SEC.manifest.replace(/manifest\.json$/,''); // ex. "MPSI/"
  return BASE + rel + f.path;                            // path déjà encodé par segment
}
async function renderPdfMobile(url, body){
  const lib=window.pdfjsLib;
  if(!lib) throw new Error('pdfjs non chargé');
  const scroll=document.createElement('div'); scroll.className='pdf-scroll';
  body.innerHTML=''; body.appendChild(scroll);
  const doc=await lib.getDocument({url}).promise;
  pdfState.doc=doc;
  const dpr=Math.min(window.devicePixelRatio||1, 2); // cap DPR pour la mémoire mobile
  for(let n=1;n<=doc.numPages;n++){
    if(pdfState.cancelled) return;
    const page=await doc.getPage(n);
    const vw=scroll.clientWidth||window.innerWidth;
    const baseVp=page.getViewport({scale:1});
    const scale=Math.max(0.2,(vw-0)/baseVp.width);
    const vp=page.getViewport({scale:scale*dpr});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    canvas.style.width=(vp.width/dpr)+'px'; canvas.style.height=(vp.height/dpr)+'px';
    scroll.appendChild(canvas);
    pdfState.task=page.render({canvasContext:canvas.getContext('2d'),viewport:vp});
    try{ await pdfState.task.promise; }catch(e){ if(pdfState.cancelled) return; }
  }
}
function openFile(f,label){
  const url=fileUrl(f);
  const ext=(f.name.split('.').pop()||'').toLowerCase();
  $('#pdfName').textContent=label||displayName(f.name,cur.chapter?.nom,catAbbrevsFor(cur.subject,cur.chapter));
  $('#pdfTab').onclick=()=>window.open(url,'_blank','noopener');
  const body=$('#pdfBody');
  pdfState={doc:null,task:null,cancelled:false};
  $('#pdfview').classList.add('on');
  if(ext==='pdf'){
    body.innerHTML='<div class="pdffallback">Chargement…</div>';
    renderPdfMobile(url,body).catch(()=>{
      /* repli iframe natif si PDF.js indisponible */
      body.innerHTML=`<iframe src="${url}#toolbar=0&view=FitH" title="${esc(f.name)}"></iframe>`;
    });
  } else if(['png','jpg','jpeg','gif','webp','svg'].includes(ext)){
    body.innerHTML=`<div class="pdf-scroll" style="display:flex;align-items:flex-start;justify-content:center">
      <img src="${url}" style="max-width:100%;height:auto" alt="${esc(f.name)}"></div>`;
  } else {
    body.innerHTML=`<div class="pdffallback"><span>Aperçu non disponible pour ce type de fichier.</span>
      <a href="${url}" target="_blank" rel="noopener">Ouvrir le fichier</a></div>`;
  }
}
function closePdf(){
  pdfState.cancelled=true;
  try{ pdfState.task&&pdfState.task.cancel(); }catch(e){}
  try{ pdfState.doc&&pdfState.doc.destroy(); }catch(e){}
  pdfState={doc:null,task:null,cancelled:false};
  $('#pdfview').classList.remove('on'); $('#pdfBody').innerHTML='';
}
$('#pdfClose').onclick=closePdf;

/* =====================================================================
   MODE TEST (flash) — progression pondérée, identique au bureau
   ===================================================================== */
let test={list:[],i:0,revealed:false,progress:[],progKeyStr:'',total:0};
const progKey=(subj,chap)=>'prog:'+(SEC?.id||'')+'/'+(subj?.id||'culture')+'/'+chap.id;
function chapLabel(){ return MAN.kind==='culture' ? cur.chapter.nom : cur.subject.nom+' · '+cur.chapter.nom; }
function mjx(el){ if(window.MathJax?.typesetPromise) MathJax.typesetPromise([el]).catch(()=>{}); }

function questionWeight(p){
  if(!p) return 1;
  if((p.ok||0)>=3) return 0;
  if((p.ko||0)>(p.ok||0)) return 4;
  if((p.mid||0)>0 && !(p.ok||0)) return 2;
  if((p.ok||0)>0) return 0.5;
  return 1;
}
function weightedShuffle(rawQs, progress){
  let pool=rawQs.map((q,i)=>{const w=questionWeight(progress[i]);return w>0?{...q,origIdx:i,_w:w}:null;}).filter(Boolean);
  const result=[];
  while(pool.length){
    const tot=pool.reduce((s,x)=>s+x._w,0); let r=Math.random()*tot, idx=0;
    for(;idx<pool.length-1;idx++){r-=pool[idx]._w; if(r<=0)break;}
    result.push(pool.splice(idx,1)[0]);
  }
  return result;
}
function progStats(progress,total){
  let acquis=0,arevoir=0;
  for(let i=0;i<total;i++){const p=progress[i]||{};
    if((p.ok||0)>=3)acquis++; else if((p.ko||0)>(p.ok||0))arevoir++;}
  return {acquis,arevoir};
}
async function startTest(){
  const c=cur.chapter, qs=c.questions||[];
  show('test');
  if(!qs.length){
    $('#qNum').textContent='0'; $('#qKind').textContent='—'; $('#qChap').textContent=chapLabel();
    $('#qPrompt').textContent='Aucune question pour ce chapitre.';
    $('#qArevoir').textContent='';
    $('#answer').classList.remove('on'); $('#selfeval').classList.remove('on');
    $('#revealBtn').disabled=true; $('#nextBtn').disabled=true;
    return;
  }
  const key=progKey(cur.subject,c);
  let raw=null; try{ raw=await idbGet(key); }catch(e){}
  const progress=raw?JSON.parse(raw):[];
  const rawList=qs.map(q=>({kind:q.type||'Question',prompt:q.enonce||q.prompt||'—',answer:q.reponse||q.answer||''}));
  const list=weightedShuffle(rawList,progress);
  test={list,i:0,revealed:false,progress,progKeyStr:key,total:qs.length};
  if(!list.length){ renderFinished(progress); return; }
  $('#qTot').textContent=list.length;
  $('#revealBtn').disabled=false; $('#revealBtn').classList.add('primary');
  renderQuestion();
}
function renderQuestion(){
  const q=test.list[test.i];
  $('#qNum').textContent=test.i+1;
  $('#qKind').textContent=q.kind;
  $('#qChap').textContent=chapLabel();
  $('#qPrompt').innerHTML=esc(q.prompt); mjx($('#qPrompt'));
  $('#pbar').style.width=(test.i/test.list.length*100)+'%';
  const s=progStats(test.progress,test.total);
  $('#qArevoir').textContent=s.arevoir?`${s.arevoir} à revoir`:'';
  test.revealed=false;
  $('#answer').classList.remove('on');
  $('#aText').innerHTML=q.answer?esc(q.answer):'<span class="ph">Réponse non renseignée.</span>';
  mjx($('#aText'));
  $('#revealBtn').textContent='Afficher la réponse'; $('#revealBtn').disabled=false; $('#revealBtn').classList.add('primary');
  $('#nextBtn').disabled=true;
  $('#nextBtn').textContent=(test.i===test.list.length-1)?'Terminer':'Question suivante';
  $('#selfeval').classList.remove('on');
}
function reveal(){
  if(test.revealed){
    $('#answer').classList.remove('on'); $('#selfeval').classList.remove('on');
    $('#revealBtn').textContent='Afficher la réponse'; test.revealed=false; return;
  }
  $('#answer').classList.add('on'); $('#selfeval').classList.add('on');
  $('#revealBtn').textContent='Masquer la réponse'; $('#nextBtn').disabled=false; test.revealed=true;
  mjx($('#aText'));
}
function applyRating(rating){
  const origIdx=test.list[test.i].origIdx;
  const p=test.progress[origIdx]||{ko:0,mid:0,ok:0};
  if(rating===0)p.ko=(p.ko||0)+1; else if(rating===1)p.mid=(p.mid||0)+1; else p.ok=(p.ok||0)+1;
  test.progress[origIdx]=p;
  idbSet(test.progKeyStr,JSON.stringify(test.progress)).catch(()=>{});
  nextQuestion();
}
function nextQuestion(){
  if(test.i>=test.list.length-1){ finishTest(); return; }
  test.i++; renderQuestion();
}
function finishTest(){
  const s=progStats(test.progress,test.total);
  $('#pbar').style.width='100%'; $('#qKind').textContent='Bilan'; $('#qChap').textContent=chapLabel();
  $('#qPrompt').textContent=`Session terminée — ${s.acquis} acquise${s.acquis>1?'s':''} sur ${test.total}${s.arevoir?' · '+s.arevoir+' à revoir':''}`;
  $('#qArevoir').textContent=''; $('#answer').classList.remove('on'); $('#selfeval').classList.remove('on');
  $('#revealBtn').disabled=true; $('#nextBtn').disabled=true;
}
function renderFinished(progress){
  const s=progStats(progress,test.total);
  $('#pbar').style.width='100%'; $('#qKind').textContent='Bilan'; $('#qChap').textContent=chapLabel();
  $('#qNum').textContent='0'; $('#qArevoir').textContent='';
  $('#qPrompt').textContent='Toutes les questions de ce chapitre sont acquises 🎉';
  $('#answer').classList.remove('on'); $('#selfeval').classList.remove('on');
  $('#revealBtn').disabled=true; $('#nextBtn').disabled=true;
}
async function resetProgress(){
  if(!confirm('Réinitialiser toute la progression de ce chapitre ?')) return;
  await idbDel(progKey(cur.subject,cur.chapter)).catch(()=>{});
  toast('Progression réinitialisée.');
  startTest();
}
$('#goTest').onclick=()=>{ if(!$('#goTest').disabled) startTest(); };
$('#revealBtn').onclick=reveal;
$('#nextBtn').onclick=nextQuestion;
$('#resetBtn').onclick=resetProgress;
document.querySelectorAll('.selfeval .se').forEach(b=>b.onclick=()=>applyRating(parseInt(b.dataset.v)));

window.addEventListener('popstate',()=>{ goBack(); });

renderGate();
</script>
